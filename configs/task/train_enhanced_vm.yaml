mode: train
debug: False

components:
  data: train
  transform: vm
  system: vm
  model: enhanced_vm

loss:
  loss: 1.0

optimizer:
  __target__: adam
  lr: 0.00001

lr_scheduler:
  T_max: 100
  eta_min: 0.000001

trainer:
  epochs: 100
  memory_cleanup_interval: 5  # Clean memory every N batches to prevent segfault (reduced from 20)
